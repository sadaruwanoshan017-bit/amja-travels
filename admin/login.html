<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · Amja Travels</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    body{display:block;background:var(--side-2);}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden;
      background:radial-gradient(1100px 600px at 15% -10%,rgba(139,92,246,.35),transparent 60%),
                 radial-gradient(1000px 700px at 100% 110%,rgba(86,72,230,.4),transparent 55%),
                 linear-gradient(160deg,#211c46,#141031);}
    .login-box{position:relative;z-index:2;background:#fff;border-radius:22px;padding:2.6rem 2.4rem;width:100%;max-width:410px;
      box-shadow:0 40px 90px -30px rgba(10,8,30,.7);}
    .login-brand{display:flex;align-items:center;gap:.7rem;justify-content:center;margin-bottom:.4rem;}
    .login-brand .mark{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 12px 26px -10px rgba(86,72,230,.9);}
    .login-brand .mark svg{width:24px;height:24px;}
    .login-box h1{color:var(--ink);font-size:1.5rem;font-weight:800;letter-spacing:-.02em;}
    .login-box .subtitle{color:var(--muted);text-align:center;font-size:.86rem;margin:.3rem 0 2rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;}
    .login-box .form-group{margin-bottom:1.1rem;}
    .login-box label{display:block;color:var(--ink-2);font-size:.8rem;margin-bottom:.4rem;font-weight:600;}
    .login-box input{width:100%;padding:.85rem 1rem;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;color:var(--ink);font-size:.95rem;font-family:inherit;transition:border-color .2s,box-shadow .2s,background .2s;}
    .login-box input::placeholder{color:#a6a9bd;}
    .login-box input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(86,72,230,.15);}
    .login-btn{width:100%;margin-top:.5rem;padding:.95rem;background:var(--brand);color:#fff;border:none;border-radius:11px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s,transform .2s;box-shadow:0 14px 28px -12px rgba(86,72,230,.9);}
    .login-btn:hover{background:var(--brand-d);transform:translateY(-1px);}
    .error-message{color:var(--danger);background:var(--danger-soft);font-size:.84rem;text-align:center;margin-top:1rem;padding:.6rem;border-radius:9px;display:none;}
    .error-message.show{display:block;}
    .login-footer{text-align:center;margin-top:1.6rem;color:#a6a9bd;font-size:.78rem;}
    /* interactive 3D background */
    #bg3d{position:absolute;inset:0;width:100%;height:100%;z-index:1;display:block;}
    .login-box{backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  </style>
</head>
<body>
  <div class="login-wrap">
    <canvas id="bg3d"></canvas>
    <div class="login-box">
      <div class="login-brand">
        <span class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <h1>Amja Travels</h1>
      </div>
      <p class="subtitle">Admin Panel</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Sign In</button>

        <div class="error-message" id="loginError">Invalid username or password</div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('loginError');
      try {
        const API_BASE = (location.protocol === 'file:') ? 'http://localhost:5000' : '';
        const response = await fetch(API_BASE + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (data.success) {
          localStorage.setItem('adminLoggedIn', 'true');
          localStorage.setItem('adminUsername', username);
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = data.message;
          errorEl.classList.add('show');
        }
      } catch (error) {
        errorEl.textContent = 'Error connecting to server';
        errorEl.classList.add('show');
      }
    });
  </script>

  <!-- Interactive 3D background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
    if (!window.THREE) return;
    const canvas = document.getElementById('bg3d');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 100);
    camera.position.z = 22;

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);

    // ── Particle field ──
    const COUNT = 900;
    const positions = new Float32Array(COUNT * 3);
    for (let i = 0; i < COUNT; i++) {
      positions[i * 3]     = (Math.random() - 0.5) * 70;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 45;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 55;
    }
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const pMat = new THREE.PointsMaterial({
      color: 0xb9aef7, size: 0.16, transparent: true, opacity: 0.85,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const points = new THREE.Points(pGeo, pMat);
    scene.add(points);

    // ── Central wireframe icosahedron ──
    const ico = new THREE.Mesh(
      new THREE.IcosahedronGeometry(6, 1),
      new THREE.MeshBasicMaterial({ color: 0x8b7bf0, wireframe: true, transparent: true, opacity: 0.35 })
    );
    scene.add(ico);

    const ico2 = new THREE.Mesh(
      new THREE.IcosahedronGeometry(9.5, 0),
      new THREE.MeshBasicMaterial({ color: 0x6d5ce8, wireframe: true, transparent: true, opacity: 0.18 })
    );
    scene.add(ico2);

    // ── Mouse parallax ──
    const target = { x: 0, y: 0 };
    const cur = { x: 0, y: 0 };
    addEventListener('mousemove', (e) => {
      target.x = (e.clientX / innerWidth - 0.5) * 2;
      target.y = (e.clientY / innerHeight - 0.5) * 2;
    });
    addEventListener('touchmove', (e) => {
      if (!e.touches[0]) return;
      target.x = (e.touches[0].clientX / innerWidth - 0.5) * 2;
      target.y = (e.touches[0].clientY / innerHeight - 0.5) * 2;
    }, { passive: true });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      cur.x += (target.x - cur.x) * 0.05;
      cur.y += (target.y - cur.y) * 0.05;

      points.rotation.y = t * 0.03 + cur.x * 0.4;
      points.rotation.x = cur.y * 0.25;

      ico.rotation.x = t * 0.15;
      ico.rotation.y = t * 0.2 + cur.x * 0.5;
      ico2.rotation.y = -t * 0.1 - cur.x * 0.4;
      ico2.rotation.z = t * 0.05;

      camera.position.x += (cur.x * 3 - camera.position.x) * 0.05;
      camera.position.y += (-cur.y * 2 - camera.position.y) * 0.05;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  })();
  </script>
</body>
</html>
