<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · Amja Travels</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    body{display:block;background:var(--side-2);}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden;
      background:radial-gradient(1100px 600px at 12% -10%,rgba(54,201,166,.28),transparent 60%),
                 radial-gradient(1000px 700px at 100% 110%,rgba(232,200,106,.22),transparent 55%),
                 linear-gradient(160deg,#07231d,#04120f);}
    .login-box{position:relative;z-index:2;background:#fff;border-radius:22px;padding:2.6rem 2.4rem;width:100%;max-width:410px;
      box-shadow:0 40px 90px -30px rgba(10,8,30,.7);}
    .login-brand{display:flex;align-items:center;gap:.7rem;justify-content:center;margin-bottom:.4rem;}
    .login-brand .mark{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 12px 26px -10px rgba(86,72,230,.9);}
    .login-brand .mark svg{width:24px;height:24px;}
    .login-box h1{color:var(--ink);font-size:1.5rem;font-weight:800;letter-spacing:-.02em;}
    .login-box .subtitle{color:var(--muted);text-align:center;font-size:.86rem;margin:.3rem 0 2rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;}
    .login-box .form-group{margin-bottom:1.1rem;}
    .login-box label{display:block;color:var(--ink-2);font-size:.8rem;margin-bottom:.4rem;font-weight:600;}
    .login-box input{width:100%;padding:.85rem 1rem;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;color:var(--ink);font-size:.95rem;font-family:inherit;transition:border-color .2s,box-shadow .2s,background .2s;}
    .login-box input::placeholder{color:#a6a9bd;}
    .login-box input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(86,72,230,.15);}
    .login-btn{width:100%;margin-top:.5rem;padding:.95rem;background:var(--brand);color:#fff;border:none;border-radius:11px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s,transform .2s;box-shadow:0 14px 28px -12px rgba(86,72,230,.9);}
    .login-btn:hover{background:var(--brand-d);transform:translateY(-1px);}
    .error-message{color:var(--danger);background:var(--danger-soft);font-size:.84rem;text-align:center;margin-top:1rem;padding:.6rem;border-radius:9px;display:none;}
    .error-message.show{display:block;}
    .login-footer{text-align:center;margin-top:1.6rem;color:#a6a9bd;font-size:.78rem;}
    /* interactive 3D background */
    #bg3d{position:absolute;inset:0;width:100%;height:100%;z-index:1;display:block;}
    .login-box{backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  </style>
</head>
<body>
  <div class="login-wrap">
    <canvas id="bg3d"></canvas>
    <div class="login-box">
      <div class="login-brand">
        <span class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <h1>Amja Travels</h1>
      </div>
      <p class="subtitle">Admin Panel</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Sign In</button>

        <div class="error-message" id="loginError">Invalid username or password</div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('loginError');
      try {
        const API_BASE = (location.protocol === 'file:') ? 'http://localhost:5000' : '';
        const response = await fetch(API_BASE + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (data.success) {
          localStorage.setItem('adminLoggedIn', 'true');
          localStorage.setItem('adminUsername', username);
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = data.message;
          errorEl.classList.add('show');
        }
      } catch (error) {
        errorEl.textContent = 'Error connecting to server';
        errorEl.classList.add('show');
      }
    });
  </script>

  <!-- Full-screen moving starfield (three.js) — brand teal/gold colours, cursor parallax -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
    if (!window.THREE) return;
    const canvas = document.getElementById('bg3d');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 1000);
    camera.position.z = 1;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);

    // Star positions + per-star brand colour (teal / gold / cream / soft-teal).
    const starCount = 2000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(starCount * 3);
    const colors = new Float32Array(starCount * 3);
    const velocities = new Float32Array(starCount);
    const PALETTE = [
      [0.91, 0.78, 0.42],  // gold
      [0.21, 0.79, 0.65],  // teal
      [0.93, 0.95, 0.91],  // cream
      [0.56, 0.85, 0.78],  // soft teal
    ];
    for (let i = 0; i < starCount; i++) {
      positions[i * 3]     = (Math.random() - 0.5) * 1200;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 1200;
      positions[i * 3 + 2] = Math.random() * 1000;
      const c = PALETTE[(Math.random() * PALETTE.length) | 0];
      colors[i * 3] = c[0]; colors[i * 3 + 1] = c[1]; colors[i * 3 + 2] = c[2];
      velocities[i] = 0.4 + Math.random() * 0.7;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const starMaterial = new THREE.PointsMaterial({
      size: 1.7, transparent: true, opacity: 0.92,
      vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const starField = new THREE.Points(geometry, starMaterial);
    scene.add(starField);

    // Cursor parallax
    let mouseX = 0, mouseY = 0;
    addEventListener('mousemove', (e) => { mouseX = e.clientX / innerWidth - 0.5; mouseY = e.clientY / innerHeight - 0.5; });
    addEventListener('touchmove', (e) => { if (e.touches[0]) { mouseX = e.touches[0].clientX / innerWidth - 0.5; mouseY = e.touches[0].clientY / innerHeight - 0.5; } }, { passive: true });

    function animate() {
      requestAnimationFrame(animate);
      const pos = geometry.attributes.position.array;
      for (let i = 0; i < starCount; i++) {
        pos[i * 3 + 2] -= velocities[i];
        if (pos[i * 3 + 2] < 0) {
          pos[i * 3]     = (Math.random() - 0.5) * 1200;
          pos[i * 3 + 1] = (Math.random() - 0.5) * 1200;
          pos[i * 3 + 2] = 1000;
        }
      }
      geometry.attributes.position.needsUpdate = true;
      camera.position.x += (mouseX * 25 - camera.position.x) * 0.03;
      camera.position.y += (-mouseY * 25 - camera.position.y) * 0.03;
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  })();
  </script>

</body>
</html>
