<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · Amja Travels</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    body{display:block;background:var(--side-2);}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden;
      background:radial-gradient(1100px 600px at 12% -10%,rgba(54,201,166,.28),transparent 60%),
                 radial-gradient(1000px 700px at 100% 110%,rgba(232,200,106,.22),transparent 55%),
                 linear-gradient(160deg,#07231d,#04120f);}
    .login-box{position:relative;z-index:2;background:#fff;border-radius:22px;padding:2.6rem 2.4rem;width:100%;max-width:410px;
      box-shadow:0 40px 90px -30px rgba(10,8,30,.7);}
    .login-brand{display:flex;align-items:center;gap:.7rem;justify-content:center;margin-bottom:.4rem;}
    .login-brand .mark{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 12px 26px -10px rgba(86,72,230,.9);}
    .login-brand .mark svg{width:24px;height:24px;}
    .login-box h1{color:var(--ink);font-size:1.5rem;font-weight:800;letter-spacing:-.02em;}
    .login-box .subtitle{color:var(--muted);text-align:center;font-size:.86rem;margin:.3rem 0 2rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;}
    .login-box .form-group{margin-bottom:1.1rem;}
    .login-box label{display:block;color:var(--ink-2);font-size:.8rem;margin-bottom:.4rem;font-weight:600;}
    .login-box input{width:100%;padding:.85rem 1rem;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;color:var(--ink);font-size:.95rem;font-family:inherit;transition:border-color .2s,box-shadow .2s,background .2s;}
    .login-box input::placeholder{color:#a6a9bd;}
    .login-box input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(86,72,230,.15);}
    .login-btn{width:100%;margin-top:.5rem;padding:.95rem;background:var(--brand);color:#fff;border:none;border-radius:11px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s,transform .2s;box-shadow:0 14px 28px -12px rgba(86,72,230,.9);}
    .login-btn:hover{background:var(--brand-d);transform:translateY(-1px);}
    .error-message{color:var(--danger);background:var(--danger-soft);font-size:.84rem;text-align:center;margin-top:1rem;padding:.6rem;border-radius:9px;display:none;}
    .error-message.show{display:block;}
    .login-footer{text-align:center;margin-top:1.6rem;color:#a6a9bd;font-size:.78rem;}
    /* interactive 3D background */
    #bg3d{position:absolute;inset:0;width:100%;height:100%;z-index:1;display:block;}
    .login-box{backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  </style>
</head>
<body>
  <div class="login-wrap">
    <canvas id="bg3d"></canvas>
    <div class="login-box">
      <div class="login-brand">
        <span class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <h1>Amja Travels</h1>
      </div>
      <p class="subtitle">Admin Panel</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Sign In</button>

        <div class="error-message" id="loginError">Invalid username or password</div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('loginError');
      try {
        const API_BASE = (location.protocol === 'file:') ? 'http://localhost:5000' : '';
        const response = await fetch(API_BASE + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (data.success) {
          localStorage.setItem('adminLoggedIn', 'true');
          localStorage.setItem('adminUsername', username);
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = data.message;
          errorEl.classList.add('show');
        }
      } catch (error) {
        errorEl.textContent = 'Error connecting to server';
        errorEl.classList.add('show');
      }
    });
  </script>

  <!-- Interactive 3D background — travel globe + orbiting flight ring (teal/gold) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
    if (!window.THREE) return;
    const canvas = document.getElementById('bg3d');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
    camera.position.z = 34;

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);

    // A gently rotating group holds the whole scene.
    const world = new THREE.Group();
    scene.add(world);

    // ── Wireframe globe (latitude/longitude sphere) ──
    const globe = new THREE.Mesh(
      new THREE.SphereGeometry(9, 30, 20),
      new THREE.MeshBasicMaterial({ color: 0x1f9e83, wireframe: true, transparent: true, opacity: 0.30 })
    );
    world.add(globe);

    // Solid inner sphere for depth
    const core = new THREE.Mesh(
      new THREE.SphereGeometry(8.6, 32, 24),
      new THREE.MeshBasicMaterial({ color: 0x0a2a24, transparent: true, opacity: 0.55 })
    );
    world.add(core);

    // ── Dotted "cities" scattered on the globe surface ──
    const CITY = 320, cpos = new Float32Array(CITY * 3);
    for (let i = 0; i < CITY; i++) {
      const th = Math.acos(2 * Math.random() - 1), ph = 2 * Math.PI * Math.random(), r = 9.05;
      cpos[i*3] = r * Math.sin(th) * Math.cos(ph);
      cpos[i*3+1] = r * Math.cos(th);
      cpos[i*3+2] = r * Math.sin(th) * Math.sin(ph);
    }
    const cGeo = new THREE.BufferGeometry();
    cGeo.setAttribute('position', new THREE.BufferAttribute(cpos, 3));
    const cities = new THREE.Points(cGeo, new THREE.PointsMaterial({
      color: 0xe8c86a, size: 0.22, transparent: true, opacity: 0.9,
      blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    world.add(cities);

    // ── Two tilted orbit rings (flight paths) ──
    function ring(radius, tiltX, tiltZ, color, op) {
      const g = new THREE.RingGeometry(radius, radius + 0.06, 120);
      const m = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: op });
      const r = new THREE.Mesh(g, m);
      r.rotation.x = tiltX; r.rotation.z = tiltZ;
      return r;
    }
    const ringA = ring(13, 1.15, 0.3, 0xe8c86a, 0.5);
    const ringB = ring(15.5, 0.6, -0.5, 0x36c9a6, 0.32);
    world.add(ringA); world.add(ringB);

    // Small orbiting glow "planes" on the rings
    const orbiters = [];
    [[13, 1.15, 0.3, 0xe8c86a], [15.5, 0.6, -0.5, 0x36c9a6]].forEach(([rad, tx, tz, col], k) => {
      const dot = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 12),
        new THREE.MeshBasicMaterial({ color: col }));
      dot.userData = { rad, tx, tz, off: k * 2.1, spd: 0.5 + k * 0.25 };
      world.add(dot); orbiters.push(dot);
    });

    // Faint starfield backdrop
    const STAR = 500, spos = new Float32Array(STAR * 3);
    for (let i = 0; i < STAR; i++) {
      spos[i*3] = (Math.random()-0.5)*160; spos[i*3+1] = (Math.random()-0.5)*110; spos[i*3+2] = (Math.random()-0.5)*90 - 30;
    }
    const sGeo = new THREE.BufferGeometry();
    sGeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
    scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0x8fd8c8, size: 0.14, transparent: true, opacity: 0.5 })));

    // ── Cursor interaction ──
    const target = { x: 0, y: 0 }, cur = { x: 0, y: 0 };
    addEventListener('mousemove', (e) => {
      target.x = (e.clientX / innerWidth - 0.5) * 2;
      target.y = (e.clientY / innerHeight - 0.5) * 2;
    });
    addEventListener('touchmove', (e) => {
      if (!e.touches[0]) return;
      target.x = (e.touches[0].clientX / innerWidth - 0.5) * 2;
      target.y = (e.touches[0].clientY / innerHeight - 0.5) * 2;
    }, { passive: true });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      cur.x += (target.x - cur.x) * 0.05;
      cur.y += (target.y - cur.y) * 0.05;

      globe.rotation.y = t * 0.06;
      cities.rotation.y = t * 0.06;
      core.rotation.y = t * 0.06;

      // Whole world tilts toward the cursor
      world.rotation.y += ((cur.x * 0.6) - world.rotation.y) * 0.05;
      world.rotation.x += ((-cur.y * 0.4) - world.rotation.x) * 0.05;

      ringA.rotation.z += 0.0016;
      ringB.rotation.z -= 0.0012;

      orbiters.forEach((o) => {
        const a = t * o.userData.spd + o.userData.off, R = o.userData.rad;
        const x = Math.cos(a) * R, y = Math.sin(a) * R;
        const v = new THREE.Vector3(x, y, 0);
        v.applyEuler(new THREE.Euler(o.userData.tx, 0, o.userData.tz));
        o.position.copy(v);
      });

      camera.position.x += (cur.x * 4 - camera.position.x) * 0.04;
      camera.position.y += (-cur.y * 3 - camera.position.y) * 0.04;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  })();
  </script>
</body>
</html>
